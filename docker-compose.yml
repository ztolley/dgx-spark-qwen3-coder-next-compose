x-common-gpu: &common-gpu
  ipc: host
  init: true
  restart: unless-stopped
  ulimits:
    memlock: -1
    stack: 67108864
  gpus: all

x-common-hf-env: &common-hf-env
  HF_HOME: /root/.cache/huggingface
  HF_HUB_DISABLE_XET: "1"
  PYTHONUNBUFFERED: "1"

services:
  qwen3-coder-next:
    <<: *common-gpu
    image: ${MAIN_IMAGE:-vllm-node:latest}
    pull_policy: never
    container_name: qwen3-coder-next
    ports:
      - "${MAIN_PORT:-30000}:30000"
    environment:
      <<: *common-hf-env
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ${HOME}/.cache/vllm:/root/.cache/vllm
      - ${HOME}/.cache/flashinfer:/root/.cache/flashinfer
      - ${HOME}/.triton:/root/.triton
      - ./vllm-mods/fix-qwen3-coder-next:/opt/qwen3-coder-next-fix:ro
      - /tmp:/tmp
    command:
      - bash
      - -lc
      - >-
        unset VLLM_BASE_DIR &&
        cd /opt/qwen3-coder-next-fix &&
        ./run.sh &&
        exec vllm serve ${MAIN_MODEL:-Qwen/Qwen3-Coder-Next-FP8}
        --enable-auto-tool-choice
        --tool-call-parser qwen3_coder
        --gpu-memory-utilization ${MAIN_GPU_MEMORY_UTILIZATION:-0.72}
        --host 0.0.0.0
        --port 30000
        --kv-cache-dtype fp8
        --load-format fastsafetensors
        --attention-backend flashinfer
        --enable-prefix-caching
        --max-model-len ${MAIN_MAX_MODEL_LEN:-32768}
        --tensor-parallel-size ${MAIN_TP_SIZE:-1}
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:30000/v1/models', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30m
    stop_grace_period: 10m

  qwen25-coder-autocomplete:
    <<: *common-gpu
    image: ${AUTOCOMPLETE_IMAGE:-lmsysorg/sglang:spark}
    container_name: qwen25-coder-autocomplete
    ports:
      - "${AUTOCOMPLETE_PORT:-30001}:30000"
    environment:
      <<: *common-hf-env
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - /tmp:/tmp
    command:
      - bash
      - -lc
      - >-
        python3 -m pip uninstall -y --break-system-packages hf-xet >/dev/null 2>&1 || true;
        exec python3 -m sglang.launch_server
        --model-path ${AUTOCOMPLETE_MODEL:-Qwen/Qwen2.5-Coder-1.5B}
        --host 0.0.0.0
        --port 30000
        --tp ${AUTOCOMPLETE_TP_SIZE:-1}
        --attention-backend flashinfer
        --mem-fraction-static ${AUTOCOMPLETE_MEM_FRACTION:-0.12}
        --watchdog-timeout ${AUTOCOMPLETE_WATCHDOG_TIMEOUT:-1800}
        --context-length ${AUTOCOMPLETE_CONTEXT_LENGTH:-4096}
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:30000/get_model_info', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 15m
    stop_grace_period: 5m
