x-common-gpu: &common-gpu
  ipc: host
  init: true
  restart: unless-stopped
  ulimits:
    memlock: -1
    stack: 67108864
  gpus: all

x-common-hf-env: &common-hf-env
  HF_HOME: /root/.cache/huggingface
  HF_HUB_DISABLE_XET: "1"
  PYTHONUNBUFFERED: "1"

services:
  qwen3-coder-next:
    <<: *common-gpu
    image: ${MAIN_IMAGE:-vllm-node:latest}
    pull_policy: never
    container_name: qwen3-coder-next
    ports:
      - "${MAIN_PORT:-30000}:30000"
    environment:
      <<: *common-hf-env
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ${HOME}/.cache/vllm:/root/.cache/vllm
      - ${HOME}/.cache/flashinfer:/root/.cache/flashinfer
      - ${HOME}/.triton:/root/.triton
      - ./vllm-mods/fix-qwen3-coder-next:/opt/qwen3-coder-next-fix:ro
      - /tmp:/tmp
    command:
      - bash
      - -lc
      - >-
        unset VLLM_BASE_DIR &&
        cd /opt/qwen3-coder-next-fix &&
        ./run.sh &&
        exec vllm serve ${MAIN_MODEL:-Qwen/Qwen3-Coder-Next-FP8}
        --enable-auto-tool-choice
        --tool-call-parser qwen3_coder
        --gpu-memory-utilization ${MAIN_GPU_MEMORY_UTILIZATION:-0.72}
        --host 0.0.0.0
        --port 30000
        --kv-cache-dtype fp8
        --load-format fastsafetensors
        --attention-backend flashinfer
        --enable-prefix-caching
        --max-model-len ${MAIN_MAX_MODEL_LEN:-32768}
        --tensor-parallel-size ${MAIN_TP_SIZE:-1}
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:30000/v1/models', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30m
    stop_grace_period: 10m

  qwen3-coder-next-int4:
    <<: *common-gpu
    profiles:
      - int4
    image: ${MAIN_INT4_IMAGE:-vllm-node:latest}
    pull_policy: never
    container_name: qwen3-coder-next-int4
    ports:
      - "${MAIN_PORT:-30000}:30000"
    environment:
      <<: *common-hf-env
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ${HOME}/.cache/vllm:/root/.cache/vllm
      - ${HOME}/.cache/flashinfer:/root/.cache/flashinfer
      - ${HOME}/.triton:/root/.triton
      - ./vllm-mods/fix-qwen3-coder-next:/opt/qwen3-coder-next-fix:ro
      - /tmp:/tmp
    command:
      - bash
      - -lc
      - >-
        unset VLLM_BASE_DIR &&
        cd /opt/qwen3-coder-next-fix &&
        ./run.sh &&
        exec vllm serve ${MAIN_INT4_MODEL:-Intel/Qwen3-Coder-Next-int4-AutoRound}
        --enable-auto-tool-choice
        --tool-call-parser qwen3_coder
        --trust-remote-code
        --dtype bfloat16
        --gpu-memory-utilization ${MAIN_INT4_GPU_MEMORY_UTILIZATION:-0.72}
        --host 0.0.0.0
        --port 30000
        --kv-cache-dtype fp8
        --attention-backend flashinfer
        --enable-prefix-caching
        --max-model-len ${MAIN_INT4_MAX_MODEL_LEN:-32768}
        --tensor-parallel-size ${MAIN_INT4_TP_SIZE:-1}
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:30000/v1/models', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30m
    stop_grace_period: 10m

  qwen25-coder-autocomplete:
    <<: *common-gpu
    image: ${AUTOCOMPLETE_IMAGE:-vllm-node:latest}
    pull_policy: never
    container_name: qwen25-coder-autocomplete
    ports:
      - "${AUTOCOMPLETE_PORT:-30001}:30000"
    environment:
      <<: *common-hf-env
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ${HOME}/.cache/vllm:/root/.cache/vllm
      - ${HOME}/.cache/flashinfer:/root/.cache/flashinfer
      - ${HOME}/.triton:/root/.triton
      - /tmp:/tmp
    command:
      - bash
      - -lc
      - >-
        unset VLLM_BASE_DIR &&
        exec vllm serve ${AUTOCOMPLETE_MODEL:-Qwen/Qwen2.5-Coder-3B}
        --host 0.0.0.0
        --port 30000
        --gpu-memory-utilization ${AUTOCOMPLETE_GPU_MEMORY_UTILIZATION:-0.08}
        --max-model-len ${AUTOCOMPLETE_MAX_MODEL_LEN:-4096}
        --load-format fastsafetensors
        --attention-backend flashinfer
        --tensor-parallel-size ${AUTOCOMPLETE_TP_SIZE:-1}
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:30000/v1/models', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 15m
    stop_grace_period: 5m
